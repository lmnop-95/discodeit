server:
  port: 8080
  error:
    include-stacktrace: on_param
    include-message: always
  compression:
    enabled: false

logging:
  level:
    root: INFO
    com.sprint.mission: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    net.ttddyy.dsproxy.listener: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
