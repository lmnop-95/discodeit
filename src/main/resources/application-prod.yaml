server:
  port: 80
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

logging:
  level:
    root: WARN
    com.sprint.mission: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false
