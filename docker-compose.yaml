services:
  app:
    image: discodeit:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit
    ports:
      - "80:80"
    environment:
      - SPRING_PROFILES_ACTIVE=prod

      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/discodeit
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-discodeit_user}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-discodeit1234}

      - SPRING_CACHE_TYPE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-and-long-enough-access-key-123}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-and-long-enough-refresh-key-456}
      - JWT_MAX_SESSIONS=3
      - JWT_REGISTRY_TYPE=in-memory
      - RATE_LIMIT_REGISTRY_TYPE=in-memory

      - ADMIN_ENABLED=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@discodeit.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-discodeit1234}

      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}

      - DATASOURCE_PROXY_ENABLED=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - binary-content-storage:/app/.discodeit/storage
    networks:
      - discodeit-network

  db:
    image: postgres:16-alpine
    container_name: discodeit-db
    environment:
      - POSTGRES_DB=discodeit
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME:-discodeit_user}
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-discodeit1234}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-discodeit_user} -d discodeit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - discodeit-network

  redis:
    image: redis:7.2-alpine
    container_name: discodeit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - discodeit-network

  kafka:
    image: apache/kafka:latest
    container_name: discodeit-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - discodeit-network

volumes:
  postgres-data:
  redis-data:
  binary-content-storage:

networks:
  discodeit-network:
    driver: bridge
